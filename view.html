<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Kinerja - Logbook Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --sidebar-w: 340px; 
            --accent: #6366f1; 
            --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7); 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            display: flex; 
            min-height: 100vh; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; 
            overflow-x: hidden;
        }

        /* Sidebar Glassmorphism */
        .v-sidebar { 
            width: var(--sidebar-w); 
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 25px; 
            position: fixed; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            z-index: 100;
            box-sizing: border-box;
        }

        /* Profile Glass Card */
        .v-profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px; 
            padding: 30px 20px; 
            text-align: center;
            margin-bottom: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .v-photo {
            width: 120px; 
            height: 150px; 
            border-radius: 18px; 
            object-fit: cover;
            border: 3px solid var(--accent); 
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Nav Glass Style */
        .v-nav { list-style: none; padding: 0; margin: 0; }
        .v-nav li {
            padding: 14px 20px; 
            border-radius: 15px; 
            cursor: pointer; 
            margin-bottom: 12px;
            font-weight: 600; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            transition: 0.3s; 
            border: 1px solid transparent; 
            color: rgba(255,255,255,0.7);
        }
        .v-nav li:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .v-nav li.active { 
            background: var(--accent-gradient); 
            color: #fff; 
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); 
        }

        /* Main Content Glass */
        .v-main { 
            margin-left: var(--sidebar-w); 
            flex: 1; 
            padding: 40px; 
            box-sizing: border-box;
        }
        
        .v-content-area {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; 
            padding: 35px; 
            min-height: 80vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .status-badge {
            display: inline-flex; 
            align-items: center; 
            gap: 6px;
            background: rgba(34, 197, 94, 0.1); 
            color: #4ade80;
            padding: 6px 16px; 
            border-radius: 100px; 
            font-size: 10px; 
            font-weight: 800;
            border: 1px solid rgba(74, 222, 128, 0.2);
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .atasan-box {
            margin-top: auto; 
            padding: 20px; 
            background: linear-gradient(to bottom right, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.02)); 
            border-radius: 20px; 
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Print Optimization */
        @media print { 
            .v-sidebar { display: none; } 
            .v-main { margin: 0; padding: 0; } 
            body { background: white; color: black; }
        }
    </style>
</head>
<body>

    <aside class="v-sidebar">
        <div class="v-profile-card">
            <div id="photo-container" class="v-photo">
                <img id="v-foto" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span id="v-avatar-fallback" style="font-size:40px; font-weight:800; opacity:0.5;">?</span>
            </div>
            
            <h3 id="view-nama" style="margin:0; font-size:18px; font-weight:800; color:#fff;">Memuat...</h3>
            <p id="view-nip" style="margin:5px 0 5px; font-size:11px; color:var(--accent); font-family:'JetBrains Mono';">NIP. -</p>
            <div class="status-badge"><i class="fa-solid fa-circle-check"></i> TERVERIFIKASI</div>
        </div>

        <div style="font-size:10px; font-weight:800; opacity:0.4; letter-spacing:2px; margin: 0 0 15px 15px;">MONITORING PERIODIK</div>
        <ul class="v-nav">
            <li class="active" onclick="switchView('rekap-harian', this)"><i class="fa-solid fa-calendar-day"></i> Rekap Harian</li>
            <li onclick="switchView('rekap-bulanan', this)"><i class="fa-solid fa-calendar-days"></i> Matriks Bulanan</li>
            <li onclick="switchView('rekap-triwulan', this)"><i class="fa-solid fa-chart-pie"></i> Capaian Triwulan</li>
            <li onclick="switchView('rekap-tahunan', this)"><i class="fa-solid fa-calendar-check"></i> Laporan Tahunan</li>
        </ul>

        <div class="atasan-box">
            <p style="margin:0; font-size:10px; color:#f59e0b; font-weight:800; letter-spacing: 1px;">ATASAN PENILAI</p>
            <p id="view-atasan" style="margin:8px 0 2px 0; font-weight:700; font-size:13px; color:#fff;">-</p>
            <p id="view-atasan-jabatan" style="margin:0; font-size:10px; opacity:0.6;">-</p>
        </div>
    </aside>

    <main class="v-main">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; padding:0 10px;">
            <div>
                <h1 style="margin:0; font-size:26px; font-weight:800; letter-spacing:-1px;">Dashboard Monitoring</h1>
                <p style="margin:5px 0 0 0; opacity:0.5; font-size:13px;">Akses laporan kinerja transparan via sistem cloud.</p>
            </div>
            <button onclick="window.print()" class="auth-btn" style="width:auto; padding:12px 25px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color: #fff; border-radius: 12px; cursor: pointer; display:flex; align-items:center; gap:8px; font-weight:700;">
                <i class="fa-solid fa-print"></i> CETAK LAPORAN
            </button>
        </header>

        <div id="page-content" class="v-content-area">
            <div style="text-align:center; padding-top:100px;">
                <div class="spinner"></div>
                <p style="margin-top:20px; opacity:0.5;">Sinkronisasi data pegawai...</p>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="ui-assets.js"></script>
    <script src="ui-master.js"></script>
    
    <script src="rekap-harian.js"></script>
    <script src="rekap-bulanan.js"></script>
    <script src="rekap-triwulan.js"></script>
    <script src="rekap-tahunan.js"></script>

    <script>
        // Ambil ID dari URL (view.html?id=USER_ID_SUPABASE)
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('id');

        async function initViewMode() {
            if (!targetUserId) {
                document.getElementById('page-content').innerHTML = `
                    <div style="text-align:center; padding:100px;">
                        <i class="fa-solid fa-link-slash" style="font-size:60px; opacity:0.2; margin-bottom:20px;"></i>
                        <h2 style="font-weight:800;">Tautan Tidak Valid</h2>
                        <p style="opacity:0.5;">ID Pegawai tidak ditemukan. Gunakan tautan dari menu profil.</p>
                    </div>`;
                return;
            }

            try {
                // Fetch Profile Target
                const { data: p, error } = await supabaseClient
                    .from('profil_user')
                    .select('*')
                    .eq('user_id', targetUserId)
                    .maybeSingle();
                
                if (error) throw error;

                if (p) {
                    // Update UI Identitas
                    document.getElementById('view-nama').innerText = p.p_nama || 'Nama Belum Diisi';
                    document.getElementById('view-nip').innerText = `NIP. ${p.p_nip || '-'}`;
                    document.getElementById('view-atasan').innerText = p.a_nama || 'Belum Ditentukan';
                    document.getElementById('view-atasan-jabatan').innerText = p.a_jabatan || 'Jabatan Atasan -';
                    
                    // Handle Foto Profil
                    const imgEl = document.getElementById('v-foto');
                    const fallbackEl = document.getElementById('v-avatar-fallback');
                    
                    if(p.p_foto && p.p_foto.trim() !== "") {
                        imgEl.src = p.p_foto;
                        imgEl.style.display = 'block';
                        fallbackEl.style.display = 'none';
                    } else {
                        imgEl.style.display = 'none';
                        fallbackEl.innerText = (p.p_nama || 'D').charAt(0).toUpperCase();
                        fallbackEl.style.display = 'block';
                    }

                    // Set GLOBAL VARIABLE agar modul rekap tahu data siapa yang ditarik
                    window.viewTargetId = targetUserId;

                    // Load Halaman Pertama (Harian)
                    switchView('rekap-harian', document.querySelector('.v-nav li'));
                } else {
                    document.getElementById('page-content').innerHTML = `<h2 style="text-align:center; padding:100px;">Pegawai tidak ditemukan.</h2>`;
                }

            } catch (err) { 
                console.error(err);
                document.getElementById('page-content').innerHTML = `<h3>Error: ${err.message}</h3>`;
            }
        }

        function switchView(page, el) {
            // Update Active Class
            document.querySelectorAll('.v-nav li').forEach(li => li.classList.remove('active'));
            if(el) el.classList.add('active');
            
            // Set ID Target lagi (just in case)
            window.viewTargetId = targetUserId; 

            if (typeof uiRekap !== 'undefined') {
                document.getElementById('page-content').innerHTML = '<div style="text-align:center; padding-top:100px;"><div class="spinner"></div></div>';
                
                // Delay sedikit agar animasi spinner terlihat
                setTimeout(() => {
                    if (page === 'rekap-harian') uiRekap.renderRekapHarian();
                    else if (page === 'rekap-bulanan') uiRekap.renderRekapBulanan();
                    else if (page === 'rekap-triwulan') uiRekap.renderRekapTriwulan();
                    else if (page === 'rekap-tahunan') uiRekap.renderRekapTahunan();
                }, 400);
            }
        }

        window.onload = initViewMode;
    </script>
</body>
</html>
